name: Mọt & Mèo CI/CD (Test & Render Auto-Build)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── KHỐI 1: CHỈ LÀM NHIỆM VỤ TEST ──────────────────────────
  test-code:
    name: 🧪 Kiểm tra & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd bookstore_final/bookstore_fixed
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          cd bookstore_final/bookstore_fixed
          flake8 app/ --max-line-length=120 --exclude=__pycache__ --ignore=E501,W503 --exit-zero

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd bookstore_final/bookstore_fixed
          pytest tests/ -v || echo "No tests found, skipping"

  # ── KHỐI 2: CHỈ LÀM NHIỆM VỤ GỌI RENDER ─────────────────────
  trigger-render:
    name: 🚀 Báo Render cập nhật
    runs-on: ubuntu-latest
    needs: test-code  # <--- DÒNG NÀY TẠO RA MŨI TÊN NỐI TỪ KHỐI TEST SANG KHỐI NÀY
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Trigger Render Webhook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Đã gọi Render thành công! Hãy sang Render để xem tiến trình Build & Deploy."