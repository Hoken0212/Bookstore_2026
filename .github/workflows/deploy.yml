name: Mọt & Mèo CI/CD (Test & Render Auto-Build)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test-and-trigger:
    name: 🧪 Kiểm tra code & 🚀 Báo Render cập nhật
    runs-on: ubuntu-latest

    steps:
      # ── 1. Kéo code về máy ảo của GitHub ────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Cài đặt Python để chạy Test ──────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Cài các thư viện cần thiết ───────────────
      - name: Install dependencies
        run: |
          cd bookstore_final/bookstore_fixed
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov flake8

      # ── 4. Chạy kiểm tra lỗi (Linting) ──────────────
      - name: Lint with flake8
        run: |
          cd bookstore_final/bookstore_fixed
          flake8 app/ --max-line-length=120 --exclude=__pycache__ --ignore=E501,W503 --exit-zero

      # ── 5. Chạy Unit Test ───────────────────────────
      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd bookstore_final/bookstore_fixed
          pytest tests/ -v || echo "No tests found, skipping"

      # ── 6. Kích hoạt Render Build & Deploy ──────────
      - name: Trigger Render Webhook
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Đã gọi Render thành công! Render đang tự động Build Docker và Deploy."